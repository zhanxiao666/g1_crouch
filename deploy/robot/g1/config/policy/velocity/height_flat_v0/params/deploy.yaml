deploy_noise:
  enabled: true

action_delay:
  enabled: true
  max_lag: 1
  hold_prob: 0.03
#deploy_noise\action_delay
#要仿真测试就需要把false改成true，部署到真机就改回false，action_delay是为了模拟真实环境中动作执行的延迟和不确定性，增加训练的鲁棒性

commands:
  twist:
    debug_arm_actions: false
    stick_deadzone: 0.10
    # While squatting, the right arm is externally controlled:
    # fresh LCM IK target -> follow IK; no target/timeout -> smoothly return to zero.
    right_arm_ik_action_channel: arm_action_data
    right_arm_ik_state_channel: body_control_data
    right_arm_ik_timeout: 0.20
    right_arm_ik_source_offset: 0
    right_arm_external_height_threshold: 0.74
    right_arm_ik_blend: 0.20
    right_arm_zero_max_speed: 0.35
    mask_right_arm_observation_during_external: true
    height_step: 0.02
    ranges:
      lin_vel_x: [-1.0, 1.0]
      lin_vel_y: [-0.5, 0.5]
      ang_vel_z: [-0.5, 0.5]
      base_height: [0.5, 0.76]
